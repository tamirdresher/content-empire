[build]
  command = "cd site && hugo --minify --baseURL https://content-empire-tdsquad.netlify.app/"
  publish = "docs"

[build.environment]
  HUGO_VERSION = "0.147.0"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Cache-Control = "public, max-age=3600"
